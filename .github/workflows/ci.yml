name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release, "patch_*"]

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rust nightly with rustfmt
        run: |
          rustup toolchain install nightly --profile minimal --component rustfmt
          rustup override set nightly
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses
        run: cargo deny check licenses

  # Build, test, and conformance share a single release-profile target/ cache.
  # This avoids maintaining separate debug and release caches for the same
  # workspace and keeps the total cache footprint well under 10 GB.
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install rust stable with clippy
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup override set stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: rust-release-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-release-${{ matrix.os }}-
      # Single unified compile pass: builds lib/bin/test targets with one
      # feature-unified dep graph. Clippy then reuses these artifacts instead
      # of triggering a full recompile from check-mode rmetas, and the
      # subsequent `cargo test` and `cargo build` steps are near no-ops.
      - name: Build workspace (lib, bin, tests)
        run: cargo test --release --workspace --all-targets --no-run
      - name: Run cargo clippy
        run: cargo clippy --release --all-features --all-targets --workspace -- -D warnings
      - name: Run helper clippy
        run: cargo clippy --release --manifest-path crates/openjd-sessions/src/helper/Cargo.toml -- -D warnings
      - name: Run tests
        run: cargo test --release --workspace
      - name: Run helper integration tests
        run: cargo test --release --manifest-path crates/openjd-sessions/src/helper/Cargo.toml
      - name: Build release binary
        run: cargo build --release --bin openjd-rs
      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: openjd-cli-${{ matrix.os }}
          path: |
            target/release/openjd-rs
            target/release/openjd-rs.exe
          if-no-files-found: error

  conformance:
    name: Conformance (${{ matrix.os }})
    needs: build-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            binary: openjd-rs
          - os: windows-latest
            binary: openjd-rs.exe
          - os: macos-latest
            binary: openjd-rs
    steps:
      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: openjd-cli-${{ matrix.os }}
          path: bin
      - name: Make binary executable
        if: runner.os != 'Windows'
        run: chmod +x bin/${{ matrix.binary }}
      - name: Symlink as openjd
        if: runner.os != 'Windows'
        run: ln -s ${{ matrix.binary }} bin/openjd
      - name: Copy as openjd.exe
        if: runner.os == 'Windows'
        run: copy bin\openjd-rs.exe bin\openjd.exe
        shell: cmd
      - name: Checkout openjd-specifications
        uses: actions/checkout@v6
        with:
          repository: OpenJobDescription/openjd-specifications
          path: openjd-specifications
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Run conformance tests (Unix)
        if: runner.os != 'Windows'
        working-directory: openjd-specifications/conformance-tests
        run: PATH="$GITHUB_WORKSPACE/bin:$PATH" uv run run_openjd_cli_tests.py '2023-09/*'
      - name: Run conformance tests (Windows)
        if: runner.os == 'Windows'
        working-directory: openjd-specifications/conformance-tests
        run: |
          $env:PATH = "$env:GITHUB_WORKSPACE\bin;$env:PATH"
          uv run run_openjd_cli_tests.py '2023-09/*'

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install MSRV toolchain
        run: |
          rustup toolchain install 1.92 --profile minimal
          rustup override set 1.92
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: rust-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-msrv-
      - name: Check compilation
        run: cargo check --workspace

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: rust-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-doc-
      - name: Run cargo doc
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings

  cross-user:
    name: Cross-User Tests (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [localuser, ldap]
    steps:
      - uses: actions/checkout@v6
      - name: Run cross-user tests
        run: |
          if [ "${{ matrix.variant }}" = "ldap" ]; then
            bash scripts/run_cross_user_tests.sh --ldap
          else
            bash scripts/run_cross_user_tests.sh
          fi

  cross-user-windows:
    name: Cross-User Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: rust-cross-user-win-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-cross-user-win-
      - name: Create test user
        shell: pwsh
        run: |
          $password = -join ((48..57) + (65..90) + (97..122) + (33,35,36,37,38,42,64) | Get-Random -Count 10 | ForEach-Object {[char]$_})
          $password = "A1a!" + $password
          echo "Y" | net user openjdtestuser $password /add
          echo "OPENJD_TEST_WIN_USER_PASSWORD=$password" >> $env:GITHUB_ENV
      - name: Run cross-user tests
        env:
          OPENJD_TEST_WIN_USER_NAME: openjdtestuser
        run: |
          cargo test --release -p openjd-sessions --features test-utils --test test_cross_user_windows -- --include-ignored --test-threads=1
          cargo test --release -p openjd-sessions --features test-utils --test test_windows_permissions -- --include-ignored --test-threads=1
      - name: Remove test user
        if: always()
        run: net user openjdtestuser /delete
        shell: cmd
