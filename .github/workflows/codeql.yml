name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 8 * * MON"

# Workflow-root default: deny everything. Per-job permissions are declared
# below for the steps that need them.
permissions: {}

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    permissions:
      # Required for github/codeql-action/init + codeql-action/analyze.
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          # Rust's CodeQL extractor does not support `autobuild` (it errors
          # out with "Rust does not support the autobuild build mode"). The
          # extractor reads source files directly via the rust-analyzer-style
          # frontend; no cargo invocation is needed for the database build.
          build-mode: none
          queries: +security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
