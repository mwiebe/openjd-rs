# Release-plz: automated versioning, changelog, and crates.io publishing.
#
# Overview:
#   On every push to `main`, release-plz does two things:
#     1. `release-pr` — opens (or updates) a single PR titled "chore: release"
#        that bumps versions, updates Cargo.lock, and regenerates CHANGELOG.md
#        for every crate with unreleased conventional-commit changes.
#     2. `release` — for any commit on `main` that matches a published
#        version (i.e. the Release PR was just merged), creates git tags,
#        GitHub Releases, and publishes the crates to crates.io in dependency
#        order.
#
# Authentication:
#   Publishing uses crates.io Trusted Publishing via OIDC. No long-lived API
#   token is stored as a secret. For this to work, each publishable crate must
#   be registered for trusted publishing in its crates.io settings (pointing
#   at this repo and this workflow filename). See RELEASING.md.
#
# Release policy:
#   - Publishable: openjd-expr, openjd-model, openjd-sessions, openjd-cli,
#                  openjd-snapshots
#   - Excluded:    openjd-for-js  (publish = false + explicit
#                  `release = false` entry in release-plz.toml)
#   - Independent versions per crate, driven by conventional commits.
#
# See release-plz.toml for the tool configuration.

name: Release-plz

on:
  push:
    branches:
      - main

# Only one release workflow runs at a time. We do NOT cancel in-progress runs
# because that could abandon an in-flight publish partway through the dependency
# chain.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Publish unreleased crates. This job only produces side effects on the
  # commit that results from merging a Release PR, because `cargo publish`
  # refuses to re-publish versions that are already on crates.io.
  release-plz-release:
    name: Release-plz release
    # Guard against release-plz running in forks.
    if: ${{ github.repository == 'OpenJobDescription/openjd-rs' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Push git tags and create GitHub Releases.
      contents: write
      # Read the Release PR metadata to associate it with the release.
      pull-requests: read
      # Exchange an OIDC token with crates.io for trusted publishing.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Generate the third-party license attribution file and attach it to
      # every GitHub Release created in this run. The file is NOT committed to
      # source; it is produced here from the released Cargo.lock so the
      # attributions match exactly what was published. release-plz exposes the
      # crates it released (with their git tags) via the `releases` output.
      - name: Install cargo-about
        if: ${{ steps.release-plz.outputs.releases_created == 'true' }}
        # The `cli` feature is required to actually build the cargo-about
        # binary; without it `cargo install` compiles the crate but emits
        # "none of the package's binaries are available" and installs nothing.
        run: cargo install cargo-about --locked --features cli
      - name: Generate and attach THIRD-PARTY-LICENSES to releases
        if: ${{ steps.release-plz.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES_JSON: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          bash scripts/generate_third_party_licenses.sh THIRD-PARTY-LICENSES
          # `releases` is a JSON array of { package_name, tag, version, ... }.
          # Attach the attribution file to each GitHub Release tag created here.
          echo "$RELEASES_JSON" | jq -r '.[].tag' | while read -r tag; do
            [ -n "$tag" ] || continue
            echo "Uploading THIRD-PARTY-LICENSES to release $tag"
            gh release upload "$tag" THIRD-PARTY-LICENSES --clobber
          done

  # Open or update the Release PR. This runs on every push to main.
  release-plz-pr:
    name: Release-plz PR
    if: ${{ github.repository == 'OpenJobDescription/openjd-rs' }}
    runs-on: ubuntu-latest
    permissions:
      # Create/update branch with version bumps, changelog, Cargo.lock.
      contents: write
      # Open and maintain the Release PR.
      pull-requests: write
    # Cancel an earlier in-progress PR update if a newer commit landed. This is
    # safe for the PR-update job (but NOT for the release job above) because
    # the next run will simply recompute the PR state from the latest commit.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
