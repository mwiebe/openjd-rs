# RFC 0008 "Lifecycle and cleanup guarantees": a failed onWrapEnvEnter is an
# inner onEnter failure, but the inner env's onWrapEnvExit and the wrapping
# environment's own onExit must still run before the session ends.
specificationVersion: environment-2023-09
extensions: [WRAP_ACTIONS, EXPR]
environment:
  name: WrapEnv
  script:
    actions:
      onEnter:
        command: python
        args: ["-c", "print('WrapEnv Own Enter')"]
      onWrapEnvEnter:
        command: python
        args: ["-c", "import sys; print('Wrap Enter Failing'); sys.exit(7)"]
      onWrapTaskRun:
        command: python
        args: ["-c", "print('Wrap Task Ran')"]
      onWrapEnvExit:
        command: python
        args: ["-c", "print('Wrap Exit Ran for {{WrappedEnv.Name}}')"]
      onExit:
        command: python
        args: ["-c", "print('WrapEnv Own Exit')"]
